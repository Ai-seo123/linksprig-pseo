services:
  # Fullstack Web Service (FastAPI + React via Docker)
  - type: web
    name: linksprig-app
    env: docker
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: WP_URL
        sync: false
      - key: WP_USER
        sync: false
      - key: WP_APP_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false


services:
  # Python FastAPI Backend Web Service
  - type: web
    name: linksprig-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: WP_URL
        sync: false
      - key: WP_USER
        sync: false
      - key: WP_APP_PASSWORD
        sync: false

  # React Frontend Static Site
  - type: web
    name: linksprig-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false


